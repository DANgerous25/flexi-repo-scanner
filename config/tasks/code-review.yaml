id: code-review
name: Weekly Code Review
description: LLM-powered review of recently changed files
active: true
connection: wheelpilot-v2
schedule:
  cron: 0 3 * * *
  timezone: Asia/Hong_Kong
scan:
  mode: diff
  type: llm-review
  paths:
    include:
    - '**/*.py'
    - '**/*.ts'
    - '**/*.tsx'
    exclude:
    - '**/test_*'
    - '**/*.test.*'
    - node_modules/
  rules: []
  llm:
    model: anthropic/claude-sonnet-4-6
    preferred_models:
    - anthropic/claude-sonnet-4-6
    prompt_template: code-review
    focus:
    - logic
    - edge-cases
    - error-handling
    - performance
    max_files_per_run: 30
    prompt: ''
  allowlist:
  - file: backend/analytics/models.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/api/admin.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/api/backtest.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/api/diagnostics.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/api/feedback.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/api/llm.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/api/market.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/auth/csrf.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/auth/db.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/auth/email.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/auth/router.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/auth/schemas.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/auth/security.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/auth/service.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/config.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  - file: backend/dependencies.py
    rules:
    - llm-review
    reason: Suppressed via LLM bulk review
  context_filters: []
  recipes: []
  ast_rules: []
actions:
- type: ai-fix-request
  trigger: findings
  model: anthropic/claude-sonnet-4-6
  target: github-pr
  labels:
  - code-review
  - auto-fix
- type: in-app-notify
  trigger: findings
task_builder_prompt: ''
