id: code-review
name: Weekly Code Review
description: LLM-powered review of recently changed files
active: true
connection: wheelpilot-v2
schedule:
  cron: 0 3 * * *
  timezone: Asia/Hong_Kong
scan:
  mode: diff
  type: llm-review
  paths:
    include:
    - '**/*.py'
    - '**/*.ts'
    - '**/*.tsx'
    exclude:
    - '**/test_*'
    - '**/*.test.*'
    - node_modules/
  rules: []
  llm:
    model: anthropic/claude-sonnet-4-6
    preferred_models:
    - anthropic/claude-sonnet-4-6
    prompt_template: code-review
    focus:
    - logic
    - edge-cases
    - error-handling
    - performance
    max_files_per_run: 30
    prompt: ''
  allowlist:
  - match: Use a distributed cache (e.g., Redis) for rate limiting, or document that
      this is only safe for single-process dev/test. Add periodic cleanup for old
      entries.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Consider making allowed events configurable via admin API or config file.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Wrap get_dashboard in try/except and return a 500 with a user-friendly
      message.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Add pagination (limit/offset) to the endpoint.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Consider optimizing with fewer queries or materialized views if performance
      becomes an issue.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Refactor base_filter/day_filter into a shared utility function.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Consider using a scheduler library (e.g., APScheduler) for more robust
      periodic tasks.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Consider adding indexes on category and tab if those queries are slow.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Clarify in the docstring or change the query to order by ascending timestamp
      if oldest-first is desired.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Validate that timestamp is always set, or filter out logs with missing
      timestamps.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Add tests for these edge cases to ensure robustness.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Document or handle cases where the user is not found or is inactive.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Remove the fallback or raise if the key is missing to catch unexpected
      values early.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: If the adapter supports batch price fetching, use it to reduce latency
      and API load.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Log a warning or error if all prices are None to aid debugging.
    reason: Suppressed via LLM bulk review
    rules:
    - llm-review
  - match: Use SQLAlchemy's text() with parameters for all variables, and avoid f-string
