id: pii-scan
name: PII & Sensitive Data Scanner
description: Detect personal information, credentials, AI attribution, and confidential
  references
active: true
connection: wheelpilot-v2
schedule:
  cron: 0 1 * * *
  timezone: Asia/Hong_Kong
scan:
  mode: full
  type: pattern
  recipes:
  - pii-detection
  - secrets-and-credentials
  - ai-attribution
  paths:
    include:
    - '**/*'
    exclude:
    - node_modules/
    - '*.lock'
    - dist/
    - build/
    - '*.min.js'
    - '*.png'
    - '*.jpg'
    - '*.jpeg'
    - '*.gif'
    - '*.ico'
    - '*.svg'
    - '*.woff'
    - '*.woff2'
    - '*.ttf'
    - '*.eot'
    - .playwright-mcp/
  rules: []
  llm:
    model: qwen/qwen3.6-plus-preview:free
    preferred_models:
    - qwen/qwen3.6-plus-preview:free
    prompt_template: ''
    prompt: ''
    focus: []
    max_files_per_run: 50
  allowlist:
  - match: user@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: newuser@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: admin@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: bob@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: carol@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: dan@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: alice@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: you@example.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: x@x.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: admin@test.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: wrong@test.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: user99@test.com
    rules:
    - email-address
    reason: Generic placeholder email
  - match: support@wheelpilot.ai
    rules:
    - email-address
    reason: Intentional support address
  - match: noreply@wheelpilot.ai
    rules:
    - email-address
    reason: Intentional noreply address
  - match: app@wheelpilot.ai
    rules:
    - email-address
    reason: Intentional app address
  - match: dan-wp@wheelpilot.ai
    rules:
    - email-address
    reason: Internal system email
  - match: dev@wheelpilot.ai
    rules:
    - email-address
    reason: Development/migration script email
  - match: AI-generated
    rules:
    - ai-authorship-generic
    reason: Standard AI attribution phrase
  - match: Auto-generated
    rules:
    - ai-authorship-generic
    reason: Standard auto-generated attribution phrase
  - file: docs/**
    reason: Documentation and mockups contain example PII
  - file: specs/**
    reason: Specification documents reference example data
  - file: scripts/migrate_sqlite_to_pg.py
    reason: Legacy migration script, no longer needed
  - file: frontend/src/pages/DisclaimerPage.tsx
    rules:
    - ai-authorship-generic
    reason: Disclaimer page intentionally mentions AI
  - file: frontend/src/components/FeedbackModal.tsx
    rules:
    - employer-reference
    reason: working for you is a UI prompt, not an employer reference
  context_filters:
  - type: llm-provider-usage
    enabled: true
  ast_rules: []
actions:
- type: in-app-notify
  trigger: findings
- type: ai-fix-request
  trigger: findings
  model: anthropic/claude-sonnet-4-6
  target: patch-file
task_builder_prompt: ''
