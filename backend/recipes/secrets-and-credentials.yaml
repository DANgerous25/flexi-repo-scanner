secrets-and-credentials:
  name: "Secrets & Credentials"
  description: "Detect hardcoded API keys, passwords, tokens, and private keys that should be in environment variables or a secrets manager"
  category: "security"
  rules:
    - id: "hardcoded-password"
      name: "Hardcoded Password"
      pattern: '(?:password|passwd|pwd)\s*[=:]\s*[''"][^''"]{4,}[''"]'
      severity: "critical"
      case_sensitive: false
    - id: "hardcoded-api-key"
      name: "Hardcoded API Key/Secret"
      pattern: '(?:api[_-]?key|api[_-]?secret|access[_-]?token|client[_-]?id|client[_-]?secret|private[_-]?key|github[_-]?token)\s*[=:]\s*[''"][A-Za-z0-9+/=_-]{20,}[''"]'
      severity: "critical"
    - id: "private-key-block"
      name: "Private Key Block"
      pattern: '-----BEGIN (?:RSA |EC |DSA )?PRIVATE KEY-----'
      severity: "critical"
    - id: "aws-access-key"
      name: "AWS Access Key ID"
      pattern: 'AKIA[0-9A-Z]{16}'
      severity: "critical"
    - id: "aws-secret-key"
      name: "AWS Secret Access Key"
      pattern: '(?:aws[_-]?secret[_-]?access[_-]?key)\s*[=:]\s*[''"][A-Za-z0-9/+=]{40}[''"]'
      severity: "critical"
      case_sensitive: false
    - id: "connection-string"
      name: "Database Connection String"
      pattern: '(?:mongodb|postgres|mysql|redis)://\S+:\S+@\S+'
      severity: "critical"
      case_sensitive: false
    - id: "jwt-secret"
      name: "Hardcoded JWT Secret"
      pattern: '(?:jwt[_-]?secret|jwt[_-]?key)\s*[=:]\s*[''"][^''"]{8,}[''"]'
      severity: "critical"
      case_sensitive: false
    - id: "slack-webhook"
      name: "Slack Webhook URL"
      pattern: 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+'
      severity: "high"
    - id: "generic-secret-assignment"
      name: "Generic Secret Assignment"
      pattern: '(?:secret|token|credential|auth_key)\s*[=:]\s*[''"][^''"]{16,}[''"]'
      severity: "high"
      case_sensitive: false
  default_allowlist:
    - file: "tests/**"
      reason: "Test fixtures often contain example credentials"
    - file: "**/fixtures/**"
      reason: "Fixture files contain intentional test data"
    - file: "*.example.*"
      reason: "Example config files use placeholder values"
    - file: "**/.env.example"
      reason: "Env example files show key names without real values"
  context_filters:
    - type: "llm-provider-usage"
      enabled: true
