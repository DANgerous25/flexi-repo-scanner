ai-attribution:
  name: "AI Tool Attribution"
  description: "Detect code that appears to be generated or authored by AI tools like Copilot, ChatGPT, or Claude, which may need review or policy compliance"
  category: "compliance"
  rules:
    - id: "ai-authorship-copilot"
      name: "GitHub Copilot Attribution"
      pattern: '\b(?:Generated|Autogenerated)\s+by\s+(?:GitHub\s+)?Copilot\b'
      severity: "medium"
      case_sensitive: false
    - id: "ai-authorship-chatgpt"
      name: "ChatGPT Attribution"
      pattern: '\bGenerated\s+by\s+ChatGPT\b'
      severity: "medium"
      case_sensitive: false
    - id: "ai-authorship-claude"
      name: "Claude Attribution"
      pattern: '\bGenerated\s+by\s+Claude\b'
      severity: "medium"
      case_sensitive: false
    - id: "ai-authorship-generic"
      name: "Generic AI Generation Marker"
      pattern: '\b(?:AI-generated|auto-generated|This code was generated)\b'
      severity: "low"
      case_sensitive: false
    - id: "ai-todo-comment"
      name: "AI Review TODO"
      pattern: '(?:TODO|FIXME|REVIEW)\s*[:)]\s*(?:AI|copilot|chatgpt|claude|llm)'
      severity: "low"
      case_sensitive: false
  default_allowlist:
    - file: "README.md"
      reason: "Documentation may mention AI tools legitimately"
    - file: "docs/**"
      reason: "Documentation about AI tool usage is expected"
  context_filters:
    - type: "llm-provider-usage"
      enabled: true
